<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script>
const p = location.pathname
if (p.startsWith('/album/')) {
  const token = p.split('/')[2]
  if (token) location.replace('/album.html?token=' + token)
} else if (p.startsWith('/a/')) {
  const token = p.split('/')[2]
  if (token) location.replace('/album.html?token=' + token)
}
</script>
</head>
<body></body>
</html>
